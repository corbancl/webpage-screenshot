<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .header-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .header-icon svg {
      width: 32px;
      height: 32px;
      fill: white;
    }
    h1 {
      font-size: 18px;
      color: #333;
      font-weight: 600;
    }
    .subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .screenshot-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }
    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      background: #fafafa;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option-btn:hover {
      border-color: #667eea;
      background: #f0f3ff;
      transform: translateY(-1px);
    }
    .option-btn.active {
      border-color: #667eea;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .option-btn.active .option-text,
    .option-btn.active .option-desc {
      color: white;
    }
    .option-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .option-btn.active .option-icon {
      background: rgba(255,255,255,0.2);
    }
    .option-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
    }
    .option-content {
      flex: 1;
    }
    .option-text {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    .option-desc {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .capture-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .capture-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }
    .capture-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .status {
      text-align: center;
      padding: 12px;
      font-size: 13px;
      color: #666;
      display: none;
    }
    .status.show {
      display: block;
    }
    .status.success {
      color: #4caf50;
    }
    .status.error {
      color: #f44336;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 20px;
      color: #666;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #e8e8e8;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      </div>
      <h1>网页截图助手</h1>
      <div class="subtitle">一键截取，轻松保存</div>
    </div>

    <div class="screenshot-options">
      <div class="option-btn active" data-type="visible" onclick="selectOption(this)">
        <div class="option-icon">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </div>
        <div class="option-content">
          <div class="option-text">可视区域截图</div>
          <div class="option-desc">截取当前屏幕可见内容</div>
        </div>
      </div>

      <div class="option-btn" data-type="full" onclick="selectOption(this)">
        <div class="option-icon">
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3 3.72L9 13l-3 4h12l-4-5z"/></svg>
        </div>
        <div class="option-content">
          <div class="option-text">整页截图</div>
          <div class="option-desc">截取整个网页完整内容</div>
        </div>
      </div>

      <div class="option-btn" data-type="selection" onclick="selectOption(this)">
        <div class="option-icon">
          <svg viewBox="0 0 24 24"><path d="M17 15h2V7c0-1.1-.9-2-2-2H9v2h8v8zM7 17V1H5v4H1v2h4v10c0 1.1.9 2 2 2h10v4h2v-4h4v-2H7z"/></svg>
        </div>
        <div class="option-content">
          <div class="option-text">区域截图</div>
          <div class="option-desc">框选想要截取的区域</div>
        </div>
      </div>
    </div>

    <button class="capture-btn" id="captureBtn" onclick="captureScreenshot()">
      📸 开始截图
    </button>

    <div class="status" id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
